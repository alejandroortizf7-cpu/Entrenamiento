<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Entrenamiento</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;0,14..32,900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0c0c0e;
      --surface: #16161a;
      --surface2: #1e1e24;
      --surface3: #26262e;
      --border: #2c2c38;
      --border2: #38384a;
      --primary: #6366f1;
      --primary-light: #818cf8;
      --accent: #10b981;
      --warn: #f59e0b;
      --danger: #ef4444;
      --abs-color: #7c3aed;
      --calf-color: #0891b2;
      --text: #f1f5f9;
      --text-dim: #94a3b8;
      --text-muted: #4b5563;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; overflow-x: hidden; font-size: 15px; }

    .screen { display: none; min-height: 100dvh; flex-direction: column; }
    .screen.active { display: flex; }

    /* === HEADER === */
    .header {
      padding: 14px 18px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
      position: sticky; top: 0; z-index: 90;
    }
    .header-title { font-size: 17px; font-weight: 700; flex: 1; }
    .icon-btn {
      width: 40px; height: 40px; border: none;
      background: var(--surface2); color: var(--text);
      border-radius: 10px; font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background .15s;
    }
    .icon-btn:active { background: var(--surface3); }

    /* === BUTTONS === */
    .btn {
      display: flex; align-items: center; justify-content: center;
      width: 100%; padding: 16px; border: none; border-radius: var(--radius);
      font-size: 16px; font-weight: 700; cursor: pointer;
      font-family: inherit; transition: filter .15s, transform .1s;
    }
    .btn:active { transform: scale(0.98); filter: brightness(0.9); }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-accent { background: var(--accent); color: #fff; }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-sm { padding: 10px 16px; font-size: 14px; width: auto; }
    .btn-outline {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 8px 14px; border: 1px solid var(--border);
      border-radius: 8px; font-size: 13px; font-weight: 600;
      background: none; color: var(--text-dim); cursor: pointer; font-family: inherit;
    }
    .btn-outline:active { background: var(--surface2); }

    /* === HOME SCREEN === */
    .home-body { flex: 1; padding: 20px 18px; display: flex; flex-direction: column; gap: 16px; overflow-y: auto; }
    .meta-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 14px; border-radius: 20px;
      font-size: 12px; font-weight: 600;
      background: var(--surface2); border: 1px solid var(--border); color: var(--text-dim);
    }
    .badge.primary { background: rgba(99,102,241,.15); border-color: rgba(99,102,241,.3); color: var(--primary-light); }
    .badge.accent { background: rgba(16,185,129,.12); border-color: rgba(16,185,129,.3); color: #34d399; }
    .session-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 22px; }
    .session-card .day-tag { font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--primary-light); margin-bottom: 6px; }
    .session-card h2 { font-size: 26px; font-weight: 900; margin-bottom: 4px; }
    .session-card .ex-count { font-size: 13px; color: var(--text-dim); margin-bottom: 18px; }
    .rest-day { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px 20px; gap: 12px; }
    .rest-day .big-icon { font-size: 64px; }
    .rest-day h2 { font-size: 24px; font-weight: 800; }
    .rest-day p { color: var(--text-dim); font-size: 15px; }
    .meso-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
    .meso-section h3 { font-size: 12px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px; }
    .week-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; }
    .week-dot {
      aspect-ratio: 1; border-radius: 8px; border: 1px solid var(--border);
      background: var(--surface2); color: var(--text-muted);
      font-size: 12px; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    .week-dot.done { background: rgba(16,185,129,.15); border-color: rgba(16,185,129,.3); color: #34d399; }
    .week-dot.active { background: var(--primary); border-color: var(--primary); color: #fff; }
    .archive-row { margin-top: 12px; display: flex; gap: 10px; }

    /* === SESSION SCREEN === */
    .session-body { flex: 1; padding: 14px 14px 24px; display: flex; flex-direction: column; gap: 6px; overflow-y: auto; }
    .section-label { font-size: 11px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--text-muted); padding: 10px 4px 4px; }

    /* Normal exercise item */
    .ex-item {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 14px;
      display: flex; align-items: center; gap: 12px;
      cursor: pointer; transition: border-color .15s;
    }
    .ex-item:active { border-color: var(--primary); }
    .ex-item.done { border-color: var(--accent); background: rgba(16,185,129,.06); }
    .ex-num {
      width: 30px; height: 30px; border-radius: 7px;
      background: var(--surface2); color: var(--text-dim);
      font-size: 12px; font-weight: 700;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .ex-num.done { background: var(--accent); color: #fff; }
    .ex-details { flex: 1; min-width: 0; }
    .ex-name { font-size: 14px; font-weight: 600; line-height: 1.3; }
    .ex-presc { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
    .ex-logged-info { font-size: 11px; color: var(--accent); font-weight: 500; margin-top: 2px; }
    .ex-chevron { color: var(--text-muted); font-size: 16px; flex-shrink: 0; }

    /* Biserie / group */
    .group-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .group-header {
      padding: 9px 14px;
      font-size: 11px; font-weight: 800; letter-spacing: .08em; text-transform: uppercase;
      display: flex; align-items: center; gap: 8px;
    }
    .group-header.abs { background: rgba(124,58,237,.18); color: #c4b5fd; border-bottom: 1px solid rgba(124,58,237,.25); }
    .group-header.pantorrilla { background: rgba(8,145,178,.18); color: #67e8f9; border-bottom: 1px solid rgba(8,145,178,.25); }
    .group-ex-item {
      padding: 13px 14px; display: flex; align-items: center; gap: 12px;
      cursor: pointer; border-bottom: 1px solid var(--border);
      transition: background .15s;
    }
    .group-ex-item:last-child { border-bottom: none; }
    .group-ex-item:active { background: var(--surface2); }
    .group-ex-item.done { background: rgba(16,185,129,.05); }
    .grp-label {
      width: 28px; height: 28px; border-radius: 7px;
      font-size: 12px; font-weight: 800; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .grp-label.A { background: rgba(124,58,237,.3); color: #c4b5fd; }
    .grp-label.B { background: rgba(37,99,235,.3); color: #93c5fd; }
    .grp-label.calf { background: rgba(8,145,178,.3); color: #67e8f9; }

    /* === LOG SCREEN === */
    .log-body { flex: 1; padding: 14px 14px 30px; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; }

    .info-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }
    .info-box .lbl { font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; }
    .info-box .val { font-size: 15px; font-weight: 600; }
    .info-box .sub { font-size: 12px; color: var(--text-dim); margin-top: 3px; }

    .last-ref { background: rgba(99,102,241,.08); border: 1px solid rgba(99,102,241,.2); border-radius: var(--radius); padding: 14px; }
    .last-ref .lbl { font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: rgba(99,102,241,.8); margin-bottom: 8px; }
    .ref-chips { display: flex; gap: 6px; flex-wrap: wrap; }
    .ref-chip {
      background: rgba(99,102,241,.15); border: 1px solid rgba(99,102,241,.25);
      border-radius: 8px; padding: 5px 10px;
      font-size: 13px; font-weight: 500; color: #a5b4fc;
    }
    .ref-empty { font-size: 13px; color: var(--text-muted); }

    /* Logged sets */
    .sets-area { display: flex; flex-direction: column; gap: 7px; }
    .set-row {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 14px;
      display: flex; align-items: center; gap: 12px;
    }
    .set-badge { font-size: 11px; font-weight: 700; color: var(--text-muted); width: 42px; flex-shrink: 0; }
    .set-info { flex: 1; font-size: 14px; font-weight: 600; }
    .set-del { background: none; border: none; color: var(--text-muted); font-size: 16px; cursor: pointer; padding: 6px; line-height: 1; }

    /* Input form */
    .log-form { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
    .form-title { font-size: 13px; font-weight: 700; color: var(--text-dim); margin-bottom: 12px; }
    .input-row { display: flex; gap: 12px; margin-bottom: 12px; }
    .input-grp { flex: 1; }
    .input-grp label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--text-dim); margin-bottom: 6px; }
    .input-grp input {
      width: 100%; padding: 14px 10px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text);
      font-size: 22px; font-weight: 700; font-family: inherit;
      text-align: center; transition: border-color .15s;
    }
    .input-grp input:focus { outline: none; border-color: var(--primary); }
    .input-grp input[type=number]::-webkit-inner-spin-button { opacity: 0; }

    /* === TIMER OVERLAY === */
    .timer-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(5,5,8,.92); z-index: 200;
      flex-direction: column; align-items: center; justify-content: center; gap: 24px;
      backdrop-filter: blur(6px);
    }
    .timer-overlay.active { display: flex; }
    .timer-ring-wrap { position: relative; width: 210px; height: 210px; }
    .timer-ring-wrap svg { position: absolute; inset: 0; transform: rotate(-90deg); }
    .timer-ring-bg { fill: none; stroke: var(--surface3); stroke-width: 6; }
    .timer-ring-prog { fill: none; stroke: var(--primary); stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset .95s linear; }
    .timer-ring-prog.done-flash { stroke: var(--accent); }
    .timer-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .timer-time { font-size: 56px; font-weight: 900; line-height: 1; }
    .timer-sub { font-size: 13px; color: var(--text-dim); margin-top: 4px; }
    .timer-ex-name { font-size: 15px; font-weight: 600; color: var(--text-dim); text-align: center; max-width: 280px; line-height: 1.4; }
    .timer-set-info { font-size: 14px; font-weight: 600; color: var(--accent); }

    /* === PROGRESS SCREEN === */
    .progress-body { flex: 1; padding: 14px; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; }
    .prog-ex-header { font-size: 20px; font-weight: 800; line-height: 1.3; }
    .prog-presc { font-size: 13px; color: var(--text-dim); margin-top: 4px; }
    .table-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th { background: var(--surface2); padding: 11px 13px; text-align: left; font-weight: 700; color: var(--text-dim); border-bottom: 1px solid var(--border); white-space: nowrap; }
    tbody td { padding: 11px 13px; border-bottom: 1px solid var(--border); white-space: nowrap; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:nth-child(even) td { background: rgba(255,255,255,.02); }
    .empty-prog { text-align: center; padding: 48px 20px; color: var(--text-muted); font-size: 14px; }
    .empty-prog .eicon { font-size: 36px; margin-bottom: 10px; }

    /* === SETTINGS MODAL === */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.7); z-index: 300;
      align-items: flex-end; justify-content: center;
      backdrop-filter: blur(4px);
    }
    .modal-overlay.active { display: flex; }
    .modal-sheet {
      background: var(--surface); border-radius: 20px 20px 0 0;
      border: 1px solid var(--border); border-bottom: none;
      padding: 20px 18px 36px; width: 100%; max-width: 520px;
      max-height: 80dvh; overflow-y: auto;
    }
    .modal-handle { width: 40px; height: 4px; background: var(--border2); border-radius: 2px; margin: 0 auto 18px; }
    .modal-title { font-size: 18px; font-weight: 800; margin-bottom: 16px; }
    .modal-section { margin-bottom: 20px; }
    .modal-section h4 { font-size: 12px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; }

    /* scrollbar */
    ::-webkit-scrollbar { width: 3px; height: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* misc */
    .tag { display: inline-block; padding: 3px 8px; border-radius: 5px; font-size: 11px; font-weight: 700; background: var(--surface2); color: var(--text-dim); }
    .tag.activation { background: rgba(245,158,11,.15); color: #fbbf24; }
  </style>
</head>
<body>

<!-- ===== SCREEN: HOME ===== -->
<div id="screen-home" class="screen active">
  <div class="header">
    <span class="header-title">💪 Mi Entrenamiento</span>
    <button class="icon-btn" onclick="openSettings()">⚙️</button>
  </div>
  <div class="home-body">
    <div class="meta-row">
      <span class="badge primary" id="home-meso-badge">Mesociclo 9</span>
      <span class="badge accent" id="home-week-badge">Semana 1</span>
    </div>
    <div id="home-session-area"></div>
    <div class="meso-section">
      <h3>Semanas del mesociclo</h3>
      <div class="week-grid" id="week-grid"></div>
      <div class="archive-row">
        <button class="btn btn-secondary btn-sm" onclick="openSettings()">Ajustes del mesociclo</button>
      </div>
    </div>
  </div>
</div>

<!-- ===== SCREEN: SESSION ===== -->
<div id="screen-session" class="screen">
  <div class="header">
    <button class="icon-btn" onclick="goHome()">←</button>
    <span class="header-title" id="session-header-title">Sesión</span>
  </div>
  <div class="session-body" id="session-body"></div>
</div>

<!-- ===== SCREEN: LOG ===== -->
<div id="screen-log" class="screen">
  <div class="header">
    <button class="icon-btn" onclick="goSession()">←</button>
    <span class="header-title" id="log-header-title">Ejercicio</span>
    <button class="btn-outline" style="font-size:12px;padding:7px 12px;" onclick="viewProgress()">📈 Progresión</button>
  </div>
  <div class="log-body" id="log-body"></div>
</div>

<!-- ===== SCREEN: PROGRESS ===== -->
<div id="screen-progress" class="screen">
  <div class="header">
    <button class="icon-btn" onclick="goLog()">←</button>
    <span class="header-title">Progresión</span>
  </div>
  <div class="progress-body" id="progress-body"></div>
</div>

<!-- ===== TIMER OVERLAY ===== -->
<div id="timer-overlay" class="timer-overlay">
  <div class="timer-ex-name" id="timer-ex-name"></div>
  <div class="timer-set-info" id="timer-set-info"></div>
  <div class="timer-ring-wrap">
    <svg viewBox="0 0 210 210">
      <circle class="timer-ring-bg" cx="105" cy="105" r="96"/>
      <circle class="timer-ring-prog" id="timer-ring" cx="105" cy="105" r="96"/>
    </svg>
    <div class="timer-center">
      <div class="timer-time" id="timer-display">0:00</div>
      <div class="timer-sub">descanso</div>
    </div>
  </div>
  <button class="btn btn-secondary" style="width:200px;" onclick="skipTimer()">Saltar descanso</button>
</div>

<!-- ===== SETTINGS MODAL ===== -->
<div id="settings-modal" class="modal-overlay" onclick="closeSettingsOutside(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">⚙️ Ajustes</div>

    <div class="modal-section">
      <h4>Mesociclo actual</h4>
      <div class="input-row" style="margin-bottom:0;">
        <div class="input-grp">
          <label>Número</label>
          <input type="number" id="settings-meso-num" min="1" style="font-size:18px;padding:12px 10px;" />
        </div>
        <div class="input-grp">
          <label>Semana (1–8)</label>
          <input type="number" id="settings-week-num" min="1" max="8" style="font-size:18px;padding:12px 10px;" />
        </div>
      </div>
    </div>

    <div class="modal-section">
      <h4>Archivado</h4>
      <p style="font-size:13px;color:var(--text-dim);margin-bottom:12px;">Archivar cierra el mesociclo actual y empieza el siguiente con datos en blanco.</p>
      <button class="btn btn-danger" onclick="archiveMesocycle()">Archivar mesociclo y empezar siguiente</button>
    </div>

    <div style="display:flex;gap:10px;margin-top:8px;">
      <button class="btn btn-accent" onclick="saveSettings()">Guardar</button>
      <button class="btn btn-secondary" onclick="closeSettings()">Cancelar</button>
    </div>
  </div>
</div>

<script>

// DATA — Sessions
// ══════════════════════════════════════════════

const DAY_MAP = { 0:null, 1:'lunes', 2:'martes', 3:'miercoles', 4:'jueves', 5:'viernes', 6:'sabado' };

// ══════════════════════════════════════════════
// STORAGE
// ══════════════════════════════════════════════
function getState() {
  try {
    return JSON.parse(localStorage.getItem('meso_state') || '{}');
  } catch { return {}; }
}
function setState(s) { localStorage.setItem('meso_state', JSON.stringify(s)); }
function getLogs() {
  try {
    return JSON.parse(localStorage.getItem('workout_logs') || '[]');
  } catch { return []; }
}
function saveLogs(logs) { localStorage.setItem('workout_logs', JSON.stringify(logs)); }

function initState() {
  let s = getState();
  if (!s.mesocycle) s.mesocycle = 9;
  if (!s.week) s.week = 1;
  if (!s.startDate) s.startDate = new Date().toISOString().slice(0,10);
  setState(s);
  return s;
}

// ══════════════════════════════════════════════
// APP STATE
// ══════════════════════════════════════════════
let appState = {
  currentDay: null,    // e.g. 'lunes'
  currentExId: null,   // exercise id being logged
  prevScreen: 'session'
};
let timerState = { id: null, total: 0, remaining: 0, active: false };

// ══════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════
function todayKey() {
  const d = new Date().getDay();
  return DAY_MAP[d];
}

function fmtDate(iso) {
  const [y,m,d] = iso.split('-');
  return `${d}/${m}/${y.slice(2)}`;
}

function exById(id) {
  for (const day of Object.values(SESSIONS)) {
    const ex = day.exercises.find(e => e.id === id);
    if (ex) return ex;
  }
  return null;
}

// Get logs for a specific exercise, sorted by date
function getExLogs(exId) {
  return getLogs()
    .filter(l => l.exId === exId)
    .sort((a,b) => a.date.localeCompare(b.date));
}

// Get last session logs for an exercise (previous date)
function getLastSessionSets(exId) {
  const logs = getExLogs(exId);
  if (!logs.length) return [];
  const last = logs[logs.length - 1];
  return last.sets || [];
}

// Get today's log entry for an exercise (current session)
function getTodayLog(exId) {
  const today = new Date().toISOString().slice(0,10);
  const s = getState();
  return getLogs().find(l => l.exId === exId && l.date === today && l.mesocycle === s.mesocycle && l.week === s.week) || null;
}

function getTodayLogSets(exId) {
  const entry = getTodayLog(exId);
  return entry ? entry.sets : [];
}

function saveSet(exId, weight, reps) {
  const today = new Date().toISOString().slice(0,10);
  const s = getState();
  let logs = getLogs();
  let entry = logs.find(l => l.exId === exId && l.date === today && l.mesocycle === s.mesocycle && l.week === s.week);
  if (!entry) {
    entry = { id: Date.now()+'_'+Math.random().toString(36).slice(2), exId, date: today, mesocycle: s.mesocycle, week: s.week, sets: [] };
    logs.push(entry);
  }
  entry.sets.push({ n: entry.sets.length + 1, weight: parseFloat(weight) || 0, reps: parseInt(reps) || 0 });
  saveLogs(logs);
}

function deleteSet(exId, setIndex) {
  const today = new Date().toISOString().slice(0,10);
  const s = getState();
  let logs = getLogs();
  const entry = logs.find(l => l.exId === exId && l.date === today && l.mesocycle === s.mesocycle && l.week === s.week);
  if (!entry) return;
  entry.sets.splice(setIndex, 1);
  entry.sets.forEach((s,i) => s.n = i+1);
  saveLogs(logs);
}

// ══════════════════════════════════════════════
// AUDIO
// ══════════════════════════════════════════════
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playBeep(freq=880, dur=0.15, vol=0.4) {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine'; osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + dur);
  } catch(e) {}
}
function playDoneSound() {
  setTimeout(() => playBeep(660, 0.12), 0);
  setTimeout(() => playBeep(880, 0.12), 150);
  setTimeout(() => playBeep(1100, 0.2), 300);
}

// ══════════════════════════════════════════════
// TIMER
// ══════════════════════════════════════════════
const CIRC = 2 * Math.PI * 96;
const timerRing = document.getElementById('timer-ring');

function startTimer(seconds, exName, setInfo) {
  if (seconds <= 0) return;
  if (timerState.id) clearInterval(timerState.id);

  timerState = { total: seconds, remaining: seconds, active: true };
  document.getElementById('timer-ex-name').textContent = exName;
  document.getElementById('timer-set-info').textContent = setInfo;
  document.getElementById('timer-overlay').classList.add('active');
  timerRing.style.strokeDasharray = CIRC;
  timerRing.classList.remove('done-flash');

  updateTimerDisplay();

  timerState.id = setInterval(() => {
    timerState.remaining--;
    updateTimerDisplay();
    if (timerState.remaining <= 0) {
      clearInterval(timerState.id);
      timerState.active = false;
      playDoneSound();
      if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
      timerRing.classList.add('done-flash');
      setTimeout(() => hideTimer(), 1200);
    }
  }, 1000);
}

function updateTimerDisplay() {
  const r = timerState.remaining;
  const m = Math.floor(r / 60);
  const s = r % 60;
  document.getElementById('timer-display').textContent = `${m}:${String(s).padStart(2,'0')}`;
  const ratio = r / timerState.total;
  timerRing.style.strokeDashoffset = CIRC * (1 - ratio);
}

function skipTimer() {
  if (timerState.id) clearInterval(timerState.id);
  timerState.active = false;
  hideTimer();
}

function hideTimer() {
  document.getElementById('timer-overlay').classList.remove('active');
}

// ══════════════════════════════════════════════
// SESSION SCREEN
// ══════════════════════════════════════════════
function renderSession(dayKey) {
  const session = SESSIONS[dayKey];
  document.getElementById('session-header-title').textContent = `${session.dayName} — ${session.name}`;

  const body = document.getElementById('session-body');
  body.innerHTML = '';

  const exercises = session.exercises;
  const rendered = new Set();

  exercises.forEach((ex, idx) => {
    if (rendered.has(ex.id)) return;

    if (ex.group) {
      // Find all exercises in this group
      const groupExs = exercises.filter(e => e.group === ex.group);
      if (rendered.has(groupExs[0].id)) return;
      groupExs.forEach(ge => rendered.add(ge.id));

      const card = document.createElement('div');
      card.className = 'group-card';

      const hdr = document.createElement('div');
      hdr.className = `group-header ${ex.groupType}`;
      hdr.innerHTML = `<span>${ex.groupType === 'abs' ? '🔥' : '🦵'} ${ex.groupLabel}</span>`;
      card.appendChild(hdr);

      groupExs.forEach(ge => {
        const sets = getTodayLogSets(ge.id);
        const done = sets.length >= ge.sets;
        const item = document.createElement('div');
        item.className = 'group-ex-item' + (done ? ' done' : '');
        item.onclick = () => openExercise(ge.id);
        const roleClass = ge.groupRole === 'calf' ? 'calf' : ge.groupRole;
        item.innerHTML = `
          <div class="grp-label ${roleClass}">${ge.groupRole}</div>
          <div class="ex-details">
            <div class="ex-name">${ge.name}</div>
            <div class="ex-presc">${ge.presc}</div>
            ${sets.length ? `<div class="ex-logged-info">✓ ${sets.length} serie${sets.length>1?'s':''} registrada${sets.length>1?'s':''}</div>` : ''}
          </div>
          <div class="ex-chevron">›</div>`;
        card.appendChild(item);
      });

      body.appendChild(card);
    } else {
      rendered.add(ex.id);
      const sets = getTodayLogSets(ex.id);
      const done = sets.length >= ex.sets;
      const item = document.createElement('div');
      item.className = 'ex-item' + (done ? ' done' : '');
      item.onclick = () => openExercise(ex.id);

      // Number — show index among non-group items
      const num = idx + 1;
      item.innerHTML = `
        <div class="ex-num ${done ? 'done' : ''}">${done ? '✓' : num}</div>
        <div class="ex-details">
          <div class="ex-name">${ex.name}${ex.note ? ` <span class="tag${ex.note.includes('Activ') ? ' activation' : ''}" style="margin-left:6px;font-size:10px;">${ex.note}</span>` : ''}</div>
          <div class="ex-presc">${ex.presc}</div>
          ${sets.length ? `<div class="ex-logged-info">✓ ${sets.length} serie${sets.length>1?'s':''} registrada${sets.length>1?'s':''}</div>` : ''}
        </div>
        <div class="ex-chevron">›</div>`;
      body.appendChild(item);
    }
  });
}

function openExercise(exId) {
  appState.currentExId = exId;
  showScreen('log');
  renderLog(exId);
}

// ══════════════════════════════════════════════
// LOG SCREEN
// ══════════════════════════════════════════════
function renderLog(exId) {
  const ex = exById(exId);
  if (!ex) return;

  document.getElementById('log-header-title').textContent = ex.name;

  const body = document.getElementById('log-body');
  const todaySets = getTodayLogSets(exId);
  const lastSets = getLastSessionSets(exId).filter(s => {
    // exclude today from "last"
    const today = new Date().toISOString().slice(0,10);
    const logs = getExLogs(exId);
    const nonToday = logs.filter(l => l.date !== today);
    return nonToday.length > 0;
  });
  // Re-get properly
  const today = new Date().toISOString().slice(0,10);
  const allLogs = getExLogs(exId);
  const prevLogs = allLogs.filter(l => l.date < today);
  const lastEntry = prevLogs.length ? prevLogs[prevLogs.length - 1] : null;
  const lastRefSets = lastEntry ? lastEntry.sets : [];

  const restLabel = ex.rest > 0 ? `${ex.rest} seg descanso` : (ex.rest === 0 ? 'Sin descanso programado' : '—');

  let html = '';

  // Prescription
  html += `<div class="info-box">
    <div class="lbl">Prescripción</div>
    <div class="val">${ex.presc}</div>
    ${ex.rest != null ? `<div class="sub">⏱ ${restLabel}</div>` : ''}
    ${ex.note ? `<div class="sub" style="margin-top:4px;color:var(--warn);">💡 ${ex.note}</div>` : ''}
  </div>`;

  // Last session reference
  html += `<div class="last-ref">
    <div class="lbl">Última sesión</div>
    <div class="ref-chips" id="ref-chips-area">`;
  if (lastRefSets.length) {
    lastRefSets.forEach(s => {
      html += `<div class="ref-chip">S${s.n}: ${s.weight > 0 ? s.weight + 'kg' : '—'} × ${s.reps}</div>`;
    });
  } else {
    html += `<span class="ref-empty">Sin datos previos</span>`;
  }
  html += `</div></div>`;

  // Logged sets today
  html += `<div class="sets-area" id="sets-area">`;
  if (todaySets.length) {
    todaySets.forEach((s, i) => {
      html += `<div class="set-row">
        <div class="set-badge">Serie ${s.n}</div>
        <div class="set-info">${s.weight > 0 ? s.weight + ' kg' : 'Peso corporal'} × ${s.reps} reps</div>
        <button class="set-del" onclick="delSet('${exId}', ${i})">✕</button>
      </div>`;
    });
  } else {
    html += `<div style="text-align:center;padding:16px 0;color:var(--text-muted);font-size:13px;">Sin series registradas hoy</div>`;
  }
  html += `</div>`;

  // Input form
  const nextSetNum = todaySets.length + 1;
  const isBodyweight = ex.presc.toLowerCase().includes('fallo') && !ex.presc.includes('kg');
  html += `<div class="log-form">
    <div class="form-title">➕ Serie ${nextSetNum} de ${ex.sets}</div>
    <div class="input-row">
      <div class="input-grp">
        <label>Peso (kg)</label>
        <input type="number" id="inp-weight" min="0" step="0.5" placeholder="0" inputmode="decimal" value="${lastRefSets[nextSetNum-2]?.weight || lastRefSets[lastRefSets.length-1]?.weight || ''}">
      </div>
      <div class="input-grp">
        <label>Reps</label>
        <input type="number" id="inp-reps" min="0" step="1" placeholder="0" inputmode="numeric" value="">
      </div>
    </div>
    <button class="btn btn-accent" onclick="logSet('${exId}')">✓ Registrar serie</button>
  </div>`;

  body.innerHTML = html;

  // Focus reps if weight prefilled
  setTimeout(() => {
    const wpEl = document.getElementById('inp-weight');
    const rpEl = document.getElementById('inp-reps');
    if (wpEl && wpEl.value) rpEl && rpEl.focus();
    else wpEl && wpEl.focus();
  }, 100);
}

function logSet(exId) {
  const weight = document.getElementById('inp-weight').value;
  const reps = document.getElementById('inp-reps').value;

  if (reps === '' || reps === null) {
    document.getElementById('inp-reps').style.borderColor = 'var(--danger)';
    setTimeout(() => document.getElementById('inp-reps').style.borderColor = '', 1000);
    return;
  }

  saveSet(exId, weight, reps);
  playBeep(660, 0.1);

  const ex = exById(exId);
  const todaySets = getTodayLogSets(exId);
  const justLogged = todaySets[todaySets.length - 1];

  // Start timer
  if (ex.rest > 0) {
    const setInfo = `Serie ${justLogged.n} — ${justLogged.weight > 0 ? justLogged.weight+'kg' : 'PC'} × ${justLogged.reps} reps`;
    startTimer(ex.rest, ex.name, setInfo);
  }

  renderLog(exId);
  // Update session screen data in background
}

function delSet(exId, idx) {
  deleteSet(exId, idx);
  renderLog(exId);
}

    });
    html += `</tbody></table></div>`;

  body.innerHTML = html;

function archiveMesocycle() {
  if (!confirm('¿Archivar el mesociclo actual y comenzar uno nuevo? Los datos quedarán guardados en el historial.')) return;
  const s = getState();
  // Archive marker
  let archives = JSON.parse(localStorage.getItem('meso_archives') || '[]');
  archives.push({ mesocycle: s.mesocycle, archivedAt: new Date().toISOString() });
  localStorage.setItem('meso_archives', JSON.stringify(archives));
  // Bump mesocycle, reset week
  s.mesocycle = (s.mesocycle || 9) + 1;
  s.week = 1;
  s.startDate = new Date().toISOString().slice(0,10);
  setState(s);
  closeSettings();
  renderHome();
  alert(`Mesociclo ${s.mesocycle - 1} archivado. Bienvenido al Mesociclo ${s.mesocycle}!`);
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
function init() {
  initState();
  showScreen('home');
  renderHome();

  // Unlock audio on first user interaction
  document.addEventListener('touchstart', () => {
    try { getAudioCtx().resume(); } catch(e) {}
  }, { once: true });
  document.addEventListener('click', () => {
    try { getAudioCtx().resume(); } catch(e) {}
  }, { once: true });
}

init();
</script>
</body>
</html>
